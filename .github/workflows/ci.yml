name: CI

on:
  push:
    branches: [master, main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  build-test-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        run: rustup update stable && rustup default stable && rustup component add clippy rustfmt

      - name: Format check
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings

      # The default build is zero-dependency; the optional `tls` feature must also
      # stay lint- and test-clean (it pulls rustls). Mirror the local check loop.
      - name: Clippy (tls feature)
        run: cargo clippy --all-targets --features tls -- -D warnings

      - name: Build
        run: cargo build --release --verbose

      - name: Test
        run: cargo test --verbose

      - name: Test (tls feature)
        run: cargo test --features tls --verbose
