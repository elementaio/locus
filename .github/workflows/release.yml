name: release

# Cut a release by pushing a tag, e.g.  git tag v0.2.0 && git push origin v0.2.0
on:
  push:
    tags: ["v*"]

permissions:
  contents: write # create the GitHub Release + upload assets
  packages: write # push the image to GHCR

env:
  CARGO_TERM_COLOR: always

jobs:
  # Create (or reuse) the GitHub Release for this tag, with install notes.
  create-release:
    runs-on: ubuntu-latest
    steps:
      - uses: softprops/action-gh-release@v2
        with:
          name: Locus ${{ github.ref_name }}
          generate_release_notes: true
          body: |
            Full notes: [CHANGELOG.md](https://github.com/intenttext/locus/blob/${{ github.ref_name }}/CHANGELOG.md).

            > Pre-1.0 preview. Not production-hardened (no AUTH/TLS) — bind to a trusted network.

            ### Install
            **Docker**
            ```
            docker run -p 6379:6379 ghcr.io/intenttext/locus:${{ github.ref_name }}
            ```
            **Prebuilt binary** — download the archive for your platform below, verify the `.sha256`, extract, and run `./locus`.

  # Cross-compile a static binary for each platform and attach it to the release.
  binaries:
    needs: create-release
    name: ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { target: x86_64-unknown-linux-musl, os: ubuntu-latest, cross: true }
          - { target: aarch64-unknown-linux-musl, os: ubuntu-latest, cross: true }
          - { target: x86_64-apple-darwin, os: macos-latest, cross: false }
          - { target: aarch64-apple-darwin, os: macos-latest, cross: false }
    steps:
      - uses: actions/checkout@v4

      - name: Add Rust target (native)
        if: ${{ !matrix.cross }}
        run: rustup target add ${{ matrix.target }}

      - name: Install cross
        if: ${{ matrix.cross }}
        run: cargo install cross --locked

      - name: Build
        run: |
          if [ "${{ matrix.cross }}" = "true" ]; then
            cross build --release --target ${{ matrix.target }}
          else
            cargo build --release --target ${{ matrix.target }}
          fi

      - name: Package
        run: |
          dist="locus-${{ github.ref_name }}-${{ matrix.target }}"
          mkdir "$dist"
          cp "target/${{ matrix.target }}/release/locus" "$dist/"
          cp README.md LICENSE CHANGELOG.md "$dist/"
          tar -czf "$dist.tar.gz" "$dist"
          shasum -a 256 "$dist.tar.gz" > "$dist.tar.gz.sha256"

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            locus-*.tar.gz
            locus-*.tar.gz.sha256

  # Build and push the container image to GitHub Container Registry.
  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
